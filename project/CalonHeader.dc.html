<style>
  .hdr-wrap{position:relative;}
  .hdr-menu{position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%) translateY(6px);min-width:280px;background:rgba(10,20,40,0.96);backdrop-filter:blur(14px);border:1px solid rgba(126,196,240,0.16);border-radius:14px;padding:8px;opacity:0;visibility:hidden;transition:opacity .2s ease,transform .2s ease;box-shadow:0 24px 60px rgba(0,0,0,0.5);z-index:60;}
  .hdr-wrap:hover .hdr-menu,.hdr-menu:hover{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
  .hdr-menu::before{content:'';position:absolute;top:-14px;left:0;right:0;height:14px;}
  .hdr-mi{display:block;padding:11px 16px;border-radius:9px;text-decoration:none;color:rgba(226,236,247,0.82);font-size:14.5px;transition:background .18s,color .18s;}
  .hdr-mi:hover{background:rgba(126,196,240,0.1);color:#fff;}
  .hdr-mi small{display:block;color:rgba(226,236,247,0.45);font-size:12px;margin-top:2px;}
  .hdr-link{color:rgba(226,236,247,0.78);text-decoration:none;letter-spacing:0.01em;font-size:15px;transition:color .18s;cursor:pointer;}
  .hdr-link:hover{color:#fff;}
  .hdr-chev{display:inline-block;margin-left:6px;border:solid rgba(226,236,247,0.6);border-width:0 1.6px 1.6px 0;padding:2.5px;transform:rotate(45deg) translateY(-1px);transition:transform .2s;}
  .hdr-wrap:hover .hdr-chev{transform:rotate(-135deg) translateY(-1px);}
  @media(max-width:760px){.hdr-center{display:none !important;}}
</style>
</helmet>
<header style="position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(10,20,40,0.78);border-bottom:1px solid rgba(126,196,240,0.12);font-family:'Sora',sans-serif;">
